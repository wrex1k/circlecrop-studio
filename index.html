<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Circle Crop Converter</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: radial-gradient(circle at top, #312e81, transparent 35%), linear-gradient(180deg, #0f172a, #020617);
      --card-bg: rgba(15, 23, 42, 0.86);
      --card-border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-secondary: #cbd5e1;
      --control-bg: rgba(30, 41, 59, 0.65);
      --upload-bg: rgba(30, 41, 59, 0.55);
      --upload-border: rgba(199, 210, 254, 0.5);
      --select-bg: rgba(30, 41, 59, 0.95);
      --select-border: rgba(148, 163, 184, 0.25);
      --canvas-bg: #111827;
      --toggle-bg: rgba(30, 41, 59, 0.8);
      --toggle-border: rgba(148, 163, 184, 0.2);
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --chip-bg: rgba(51, 65, 85, 0.7);
      --chip-active: rgba(99, 102, 241, 0.25);
      --chip-border: rgba(148, 163, 184, 0.18);
      --tooltip-bg: #1e293b;
      --gallery-scrollbar: rgba(99,102,241,0.3);
    }

    :root[data-theme="light"] {
      --bg: radial-gradient(circle at top, #ddd6fe, transparent 40%), linear-gradient(180deg, #f8fafc, #f1f5f9);
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(0, 0, 0, 0.08);
      --text: #0f172a;
      --text-muted: #64748b;
      --text-secondary: #475569;
      --control-bg: rgba(241, 245, 249, 0.9);
      --upload-bg: rgba(241, 245, 249, 0.8);
      --upload-border: rgba(99, 102, 241, 0.4);
      --select-bg: rgba(255, 255, 255, 0.95);
      --select-border: rgba(0, 0, 0, 0.12);
      --canvas-bg: #e2e8f0;
      --toggle-bg: rgba(241, 245, 249, 0.9);
      --toggle-border: rgba(0, 0, 0, 0.1);
      --shadow: 0 20px 60px rgba(0,0,0,0.1);
      --chip-bg: rgba(226, 232, 240, 0.8);
      --chip-active: rgba(99, 102, 241, 0.12);
      --chip-border: rgba(0, 0, 0, 0.1);
      --tooltip-bg: #1e293b;
      --gallery-scrollbar: rgba(99,102,241,0.25);
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin: 14px 0 30px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) 380px;
      gap: 16px;
      align-items: start;
    }

    .left-panel,
    .right-panel {
      min-width: 0;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      margin-bottom: 12px;
    }

    .tab-switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tab-button {
      min-height: 48px;
      border: 1.5px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-muted);
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      backdrop-filter: blur(16px);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .tab-button:hover {
      transform: translateY(-1px);
      border-color: rgba(129,140,248,0.65);
      color: var(--text);
    }

    .tab-button.active {
      color: white;
      border-color: rgba(129,140,248,0.65);
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 14px 34px rgba(99,102,241,0.28);
    }

    .browser-frame {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .main-surface {
      padding: 14px;
      background: var(--card-bg);
      border-radius: 22px;
    }

    .panel-section {
      display: none;
    }

    .panel-section.active {
      display: block;
    }

    .canvas-wrap,
    .preview-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: var(--canvas-bg);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    canvas {
      width: 100%;
      display: block;
      touch-action: none;
      user-select: none;
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 520px;
      padding: 24px;
    }

    #previewCanvas {
      width: min(520px, 100%);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background:
        linear-gradient(45deg, rgba(148,163,184,0.18) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(148,163,184,0.18) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(148,163,184,0.18) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(148,163,184,0.18) 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 16px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #c7d2fe;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      max-width: 260px;
    }

    .theme-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .theme-label {
      font-size: 13px;
      font-weight: 650;
    }

    .theme-pill {
      display: flex;
      background: var(--control-bg);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--card-border);
    }

    .theme-option {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
    }

    .theme-option.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .upload-box {
      width: 100%;
      border: 1.5px dashed var(--upload-border);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      background: var(--upload-bg);
      cursor: pointer;
      display: block;
    }

    .upload-box:hover,
    .upload-box.drag-over {
      border-color: #818cf8;
      background: rgba(99, 102, 241, 0.08);
    }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .upload-title {
      font-weight: 750;
      font-size: 15px;
    }

    .upload-hint {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .upload-paste {
      color: var(--text-muted);
      font-size: 11px;
      margin-top: 3px;
      opacity: 0.65;
    }

    .file-name {
      margin-top: 8px;
      font-size: 12px;
      color: #818cf8;
      word-break: break-all;
      display: none;
    }

    input[type="file"] {
      display: none;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .control {
      background: var(--control-bg);
      padding: 12px 14px;
      border-radius: 16px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    label {
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
    }

    .value {
      color: #818cf8;
      font-size: 12px;
      font-weight: 700;
      background: rgba(99,102,241,0.12);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #818cf8;
      cursor: pointer;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tool-btn {
      border: 1.5px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--text-secondary);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    .tool-btn:hover {
      border-color: #818cf8;
      color: var(--text);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
      border: 1.5px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
    }

    .chip:hover {
      border-color: #818cf8;
      color: var(--text);
    }

    .chip.active {
      background: var(--chip-active);
      border-color: #6366f1;
      color: #818cf8;
    }

    .select-wrap {
      position: relative;
      width: 100%;
    }

    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }

    select {
      width: 100%;
      padding: 13px 36px 13px 14px;
      font-size: 14px;
      font-weight: 650;
      border-radius: 14px;
      border: 1.5px solid var(--select-border);
      background: var(--select-bg);
      color: var(--text);
      cursor: pointer;
      appearance: none;
      outline: none;
      font-family: inherit;
    }

    select:hover {
      border-color: #818cf8;
    }

    select:focus {
      border-color: #6366f1;
    }

    .custom-color-row {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--chip-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .custom-color-label {
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
    }

    .color-picker-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1.5px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .color-picker-pill:hover {
      border-color: #818cf8;
      color: var(--text);
      transform: translateY(-1px);
    }

    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.35),
        0 0 0 1px rgba(0,0,0,0.12);
    }

    #customBackground {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .section-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      flex: 1;
    }

    .info-btn {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(99,102,241,0.18);
      color: #818cf8;
      font-size: 11px;
      font-weight: 800;
      border: none;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .info-btn:hover .tooltip,
    .info-btn:focus .tooltip {
      display: block;
    }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      width: 240px;
      background: var(--tooltip-bg);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.6;
      color: #cbd5e1;
      z-index: 200;
      font-weight: 400;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      pointer-events: none;
    }

    .tooltip strong {
      color: #c7d2fe;
      display: block;
      margin-bottom: 8px;
    }

    .tip-row {
      display: flex;
      gap: 7px;
      margin-bottom: 5px;
    }

    .tip-badge {
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(99,102,241,0.2);
      color: #818cf8;
      height: fit-content;
      margin-top: 2px;
    }

    .tip-badge.jpg {
      background: rgba(245,158,11,0.2);
      color: #fbbf24;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-secondary {
      background: var(--chip-bg);
      color: var(--text-secondary);
      border: 1.5px solid var(--chip-border);
      margin-top: 8px;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: #818cf8;
      color: var(--text);
    }

    .gallery-card {
      display: none;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .gallery-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .gallery-badge {
      font-size: 11px;
      font-weight: 800;
      background: rgba(99,102,241,0.18);
      color: #818cf8;
      padding: 3px 9px;
      border-radius: 999px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
      max-height: 380px;
      overflow-y: auto;
      padding: 2px 5px 2px 2px;
    }

    .gallery-grid::-webkit-scrollbar {
      width: 5px;
    }

    .gallery-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    .gallery-grid::-webkit-scrollbar-thumb {
      background: var(--gallery-scrollbar);
      border-radius: 999px;
    }

    .gallery-item {
      border: 1.5px solid var(--chip-border);
      background: rgba(30, 41, 59, 0.38);
      color: inherit;
      border-radius: 16px;
      padding: 6px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      min-width: 0;
      transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    :root[data-theme="light"] .gallery-item {
      background: rgba(241, 245, 249, 0.75);
    }

    .gallery-item:hover {
      border-color: rgba(129,140,248,0.75);
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(99,102,241,0.18);
    }

    .gallery-item.selected {
      border-color: #6366f1;
      background: rgba(99,102,241,0.16);
      box-shadow:
        0 0 0 2px rgba(99,102,241,0.18),
        0 12px 26px rgba(99,102,241,0.18);
    }

    .gallery-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(99,102,241,0.22), transparent 45%),
        var(--canvas-bg);
      border: 1px solid rgba(148,163,184,0.12);
    }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .gallery-thumb img.loaded {
      opacity: 1;
    }

    .gallery-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #818cf8;
      font-size: 22px;
      font-weight: 800;
    }

    .gallery-item-name {
      margin-top: 6px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      padding: 0 1px;
    }

    .gallery-item-selected-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
      box-shadow: 0 4px 10px rgba(99,102,241,0.45);
      z-index: 3;
    }

    .gallery-item.selected .gallery-item-selected-badge {
      display: flex;
    }

    .gallery-item-spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.48);
      z-index: 2;
    }

    .gallery-item-spinner.visible {
      display: flex;
    }

    .gallery-item-spinner .mini-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(99,102,241,0.25);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .zip-progress-bar {
      width: 180px;
      height: 4px;
      background: rgba(99,102,241,0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .zip-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      border-radius: 2px;
      transition: width 0.25s ease;
      width: 0%;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .app {
        max-width: 560px;
      }

      .preview-wrap {
        min-height: 360px;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .hero {
        margin: 10px 0 14px;
      }

      .card {
        padding: 11px;
        border-radius: 18px;
      }

      .browser-frame {
        border-radius: 20px;
      }

      .main-surface {
        padding: 11px;
        border-radius: 20px;
      }

      .tab-switcher {
        gap: 8px;
        margin-bottom: 10px;
      }

      .tab-button {
        min-height: 46px;
        font-size: 12px;
        padding: 10px 12px;
        border-radius: 14px;
      }

      .btn {
        padding: 14px;
        font-size: 15px;
      }

      .chip {
        padding: 5px 10px;
        font-size: 11px;
      }

      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
<main class="app">

  <section class="hero">
    <h1>Circle Crop Converter</h1>
    <p class="subtitle">Upload a photo or ZIP, adjust the crop, and export.</p>
  </section>

  <div class="layout">

    <section class="left-panel">

      <div class="tab-switcher">
        <button class="tab-button active" id="editTabBtn" type="button">Edit</button>
        <button class="tab-button" id="exportTabBtn" type="button">Export / Preview</button>
      </div>

      <div class="browser-frame">
        <div class="main-surface">
          <section class="panel-section active" id="editView">
            <div class="canvas-wrap">
              <canvas id="canvas"></canvas>
              <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">Loading photo…</div>
                <div class="zip-progress-bar" id="zipProgressBar" style="display:none;">
                  <div class="zip-progress-fill" id="zipProgressFill"></div>
                </div>
              </div>
            </div>
          </section>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>

<script>
  const editTabBtn      = document.getElementById('editTabBtn');
  const exportTabBtn    = document.getElementById('exportTabBtn');
  const editView        = document.getElementById('editView');
  const exportView      = document.getElementById('exportView');
  const editControls    = document.getElementById('editControls');
  const exportControls  = document.getElementById('exportControls');

  const uploadInput     = document.getElementById('upload');
  const uploadBox       = document.getElementById('uploadBox');
  const canvas          = document.getElementById('canvas');
  const ctx             = canvas.getContext('2d');
  const previewCanvas   = document.getElementById('previewCanvas');
  const previewCtx      = previewCanvas.getContext('2d');

  const fileNameEl      = document.getElementById('fileName');
  const loadingOverlay  = document.getElementById('loadingOverlay');
  const loadingText     = document.getElementById('loadingText');
  const zipProgressBar  = document.getElementById('zipProgressBar');
  const zipProgressFill = document.getElementById('zipProgressFill');

  const circleSizeInput    = document.getElementById('circleSize');
  const circleSizeValue    = document.getElementById('circleSizeValue');
  const cornerRadiusInput  = document.getElementById('cornerRadius');
  const cornerRadiusValue  = document.getElementById('cornerRadiusValue');

  const rotateLeftBtn     = document.getElementById('rotateLeft');
  const rotateRightBtn    = document.getElementById('rotateRight');
  const flipHorizontalBtn = document.getElementById('flipHorizontal');
  const flipVerticalBtn   = document.getElementById('flipVertical');

  const downloadBtn       = document.getElementById('download');
  const downloadZipBtn    = document.getElementById('downloadZip');
  const formatSelect      = document.getElementById('format');
  const backgroundControls = document.getElementById('backgroundControls');
  const backgroundChips   = document.getElementById('backgroundChips');
  const customBackgroundInput = document.getElementById('customBackground');
  const customColorDot    = document.getElementById('customColorDot');
  const customColorValue  = document.getElementById('customColorValue');
  const sizeChips         = document.getElementById('sizeChips');

  const galleryCard  = document.getElementById('galleryCard');
  const galleryGrid  = document.getElementById('galleryGrid');
  const galleryBadge = document.getElementById('galleryBadge');

  let image = new Image();
  let imageLoaded = false;
  let originalFileName = 'photo';
  let selectedSize = 'original';
  let selectedBackground = '#ffffff';
  let currentImageUrl = null;

  let rotation = 0;
  let flipX = false;
  let flipY = false;

  let circle = { x: 0, y: 0, radius: 0 };
  let isDragging = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;

  let zipImages = [];
  let activeZipIndex = -1;

  function setTheme(t) {
    document.documentElement.dataset.theme = t;
    document.getElementById('themeLight').classList.toggle('active', t === 'light');
    document.getElementById('themeDark').classList.toggle('active', t === 'dark');

    if (imageLoaded) {
      draw();
      updatePreviewIfVisible();
    } else {
      drawMessage('Upload photo or ZIP');
      drawPreviewPlaceholder();
    }
  }

  function setActiveTab(tab) {
    const isEdit = tab === 'edit';

    editTabBtn.classList.toggle('active', isEdit);
    exportTabBtn.classList.toggle('active', !isEdit);

    editView.classList.toggle('active', isEdit);
    exportView.classList.toggle('active', !isEdit);

    editControls.classList.toggle('active', isEdit);
    exportControls.classList.toggle('active', !isEdit);

    if (!isEdit) drawPreview();
  }

  function isExportTabActive() {
    return exportView.classList.contains('active');
  }

  function updatePreviewIfVisible() {
    if (isExportTabActive()) drawPreview();
  }

  editTabBtn.addEventListener('click', () => setActiveTab('edit'));
  exportTabBtn.addEventListener('click', () => setActiveTab('export'));

  function showLoading(msg, showProgress = false) {
    loadingText.textContent = msg || 'Loading…';
    zipProgressBar.style.display = showProgress ? 'block' : 'none';
    zipProgressFill.style.width = '0%';
    loadingOverlay.classList.add('visible');
  }

  function setLoadingProgress(pct) {
    zipProgressFill.style.width = Math.round(pct) + '%';
  }

  function hideLoading() {
    loadingOverlay.classList.remove('visible');
    zipProgressBar.style.display = 'none';
  }

  const IMAGE_EXTENSIONS = /\.(jpe?g|png|gif|webp|bmp|tiff?|heic|heif|heics|heifs)$/i;

  function isZipFile(file) {
    return (
      file.type === 'application/zip' ||
      file.type === 'application/x-zip-compressed' ||
      (file.type === 'application/octet-stream' && file.name.toLowerCase().endsWith('.zip')) ||
      file.name.toLowerCase().endsWith('.zip')
    );
  }

  uploadInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    e.target.value = '';

    if (isZipFile(file)) {
      processZipFile(file);
    } else {
      clearZipGallery();
      processFile(file);
    }
  });

  document.addEventListener('paste', (e) => {
    const items = (e.clipboardData || e.originalEvent?.clipboardData)?.items;
    if (!items) return;

    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) {
          clearZipGallery();
          processFile(file);
        }
        break;
      }
    }
  });

  uploadBox.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadBox.classList.add('drag-over');
  });

  uploadBox.addEventListener('dragleave', () => {
    uploadBox.classList.remove('drag-over');
  });

  uploadBox.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadBox.classList.remove('drag-over');

    const file = e.dataTransfer.files[0];
    if (!file) return;

    if (isZipFile(file)) {
      processZipFile(file);
    } else {
      clearZipGallery();
      processFile(file);
    }
  });

  async function processZipFile(file) {
    originalFileName = file.name || 'archive';
    fileNameEl.textContent = originalFileName;
    fileNameEl.style.display = 'block';

    clearZipGallery();

    imageLoaded = false;
    downloadBtn.disabled = true;
    downloadZipBtn.style.display = 'none';
    downloadZipBtn.disabled = true;

    setPlaceholderCanvas();
    drawMessage('Extracting ZIP…');
    drawPreviewPlaceholder();
    showLoading('Extracting ZIP…', true);

    try {
      const jszip = new JSZip();
      const zip = await jszip.loadAsync(file);

      const entries = [];

      zip.forEach((relativePath, zipEntry) => {
        if (zipEntry.dir) return;
        if (relativePath.startsWith('__MACOSX/') || relativePath.includes('/.')) return;

        const base = relativePath.split('/').pop();
        if (!base || base.startsWith('.')) return;

        if (IMAGE_EXTENSIONS.test(relativePath)) {
          entries.push({ name: base, entry: zipEntry });
        }
      });

      if (entries.length === 0) {
        hideLoading();
        drawMessage('No images found in ZIP');
        return;
      }

      for (let i = 0; i < entries.length; i++) {
        const { name, entry } = entries[i];

        loadingText.textContent = `Extracting ${i + 1} / ${entries.length}…`;

        const rawBlob = await entry.async('blob');
        const typedBlob = makeTypedImageBlob(rawBlob, name);

        zipImages.push({
          name,
          blob: typedBlob,
          thumbUrl: null,
          convertedBlob: null
        });

        setLoadingProgress(((i + 1) / entries.length) * 100);
      }

      hideLoading();
      buildGallery();
      loadZipItem(0);

    } catch (err) {
      console.error(err);
      hideLoading();
      drawMessage('Could not read ZIP file');
    }
  }

  function makeTypedImageBlob(blob, name) {
    const ext = name.toLowerCase().split('.').pop();

    const typeMap = {
      jpg: 'image/jpeg',
      jpeg: 'image/jpeg',
      png: 'image/png',
      gif: 'image/gif',
      webp: 'image/webp',
      bmp: 'image/bmp',
      tif: 'image/tiff',
      tiff: 'image/tiff',
      heic: 'image/heic',
      heif: 'image/heif',
      heics: 'image/heic-sequence',
      heifs: 'image/heif-sequence'
    };

    return new Blob([blob], { type: typeMap[ext] || blob.type || 'application/octet-stream' });
  }

  function clearZipGallery() {
    zipImages.forEach(item => {
      if (item.thumbUrl) URL.revokeObjectURL(item.thumbUrl);
    });

    zipImages = [];
    activeZipIndex = -1;

    galleryCard.style.display = 'none';
    galleryGrid.innerHTML = '';

    downloadZipBtn.style.display = 'none';
    downloadZipBtn.disabled = true;
  }

  function buildGallery() {
    galleryGrid.innerHTML = '';
    galleryBadge.textContent = zipImages.length;

    zipImages.forEach((item, index) => {
      const button = document.createElement('button');
      button.className = 'gallery-item';
      button.type = 'button';
      button.dataset.index = index;
      button.title = item.name;

      const thumb = document.createElement('div');
      thumb.className = 'gallery-thumb';

      const img = document.createElement('img');
      img.alt = item.name;
      img.loading = 'lazy';

      const placeholder = document.createElement('div');
      placeholder.className = 'gallery-placeholder';
      placeholder.textContent = '📷';

      const badge = document.createElement('div');
      badge.className = 'gallery-item-selected-badge';
      badge.textContent = '✓';

      const spinner = document.createElement('div');
      spinner.className = 'gallery-item-spinner';
      spinner.innerHTML = '<div class="mini-spinner"></div>';

      const caption = document.createElement('div');
      caption.className = 'gallery-item-name';
      caption.textContent = item.name;

      thumb.appendChild(img);
      thumb.appendChild(placeholder);
      thumb.appendChild(badge);
      thumb.appendChild(spinner);

      button.appendChild(thumb);
      button.appendChild(caption);

      button.addEventListener('click', () => loadZipItem(index));

      galleryGrid.appendChild(button);

      hydrateGalleryThumbnail(item, img, placeholder, spinner);
    });

    galleryCard.style.display = 'block';
    downloadZipBtn.style.display = 'block';
    downloadZipBtn.disabled = false;
  }

  async function hydrateGalleryThumbnail(item, img, placeholder, spinner) {
    spinner.classList.add('visible');

    try {
      let displayBlob = item.blob;

      if (await isProbablyHeic(item.blob)) {
        displayBlob = await convertHeicFile(item.blob);
        item.convertedBlob = displayBlob;
      }

      const thumbBlob = await createSquareThumbnailBlob(displayBlob, 420);
      const url = URL.createObjectURL(thumbBlob);

      item.thumbUrl = url;

      img.onload = () => {
        img.classList.add('loaded');
        placeholder.style.display = 'none';
        spinner.classList.remove('visible');
      };

      img.onerror = () => {
        placeholder.textContent = '!';
        spinner.classList.remove('visible');
      };

      img.src = url;

    } catch (err) {
      console.error('Thumbnail failed:', item.name, err);

      try {
        const fallbackUrl = URL.createObjectURL(item.blob);
        item.thumbUrl = fallbackUrl;

        img.onload = () => {
          img.classList.add('loaded');
          placeholder.style.display = 'none';
          spinner.classList.remove('visible');
        };

        img.onerror = () => {
          placeholder.textContent = '!';
          spinner.classList.remove('visible');
        };

        img.src = fallbackUrl;
      } catch {
        placeholder.textContent = '!';
        spinner.classList.remove('visible');
      }
    }
  }

  async function createSquareThumbnailBlob(blob, size = 420) {
    const img = await loadImageOnly(blob);

    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;

    const c = document.createElement('canvas');
    const cctx = c.getContext('2d');

    c.width = size;
    c.height = size;

    cctx.fillStyle = '#111827';
    cctx.fillRect(0, 0, size, size);

    const scale = Math.max(size / iw, size / ih);
    const dw = iw * scale;
    const dh = ih * scale;
    const dx = (size - dw) / 2;
    const dy = (size - dh) / 2;

    cctx.drawImage(img, dx, dy, dw, dh);

    return await canvasToBlob(c, 'image/jpeg', 0.88);
  }

  function setGallerySelected(index) {
    galleryGrid.querySelectorAll('.gallery-item').forEach((el, i) => {
      el.classList.toggle('selected', i === index);
    });

    activeZipIndex = index;
  }

  function setGalleryItemLoading(index, loading) {
    const items = galleryGrid.querySelectorAll('.gallery-item');

    if (items[index]) {
      const spinner = items[index].querySelector('.gallery-item-spinner');
      if (spinner) spinner.classList.toggle('visible', loading);
    }
  }

  async function loadZipItem(index) {
    if (index < 0 || index >= zipImages.length) return;
    if (index === activeZipIndex && imageLoaded) return;

    const item = zipImages[index];

    setGallerySelected(index);
    setGalleryItemLoading(index, true);

    imageLoaded = false;
    downloadBtn.disabled = true;

    rotation = 0;
    flipX = false;
    flipY = false;

    setPlaceholderCanvas();
    drawMessage('Loading…');
    drawPreviewPlaceholder();

    try {
      let displayBlob = item.convertedBlob || item.blob;

      if (!item.convertedBlob && await isProbablyHeic(item.blob)) {
        displayBlob = await convertHeicFile(item.blob);
        item.convertedBlob = displayBlob;
      }

      await loadBlobIntoImage(displayBlob);

      originalFileName = item.name;
      imageLoaded = true;

      prepareCanvasForImage();
      resetCircle();
      draw();

      downloadBtn.disabled = false;
      setGalleryItemLoading(index, false);
      setActiveTab('edit');

    } catch (err) {
      console.error(err);
      setGalleryItemLoading(index, false);
      drawMessage('Could not load this image');
    }
  }

  async function processFile(file) {
    if (!file) return;

    originalFileName = file.name || 'photo';
    fileNameEl.textContent = originalFileName;
    fileNameEl.style.display = 'block';

    imageLoaded = false;
    downloadBtn.disabled = true;

    rotation = 0;
    flipX = false;
    flipY = false;

    setPlaceholderCanvas();
    drawMessage('Loading photo');
    drawPreviewPlaceholder();
    showLoading('Loading photo…');

    try {
      let displayBlob = file;

      if (await isProbablyHeic(file)) {
        showLoading('Converting HEIC photo…');
        displayBlob = await convertHeicFile(file);
      }

      await loadBlobIntoImage(displayBlob);

      imageLoaded = true;

      prepareCanvasForImage();
      resetCircle();
      draw();

      hideLoading();
      downloadBtn.disabled = false;

    } catch (err) {
      console.error(err);
      hideLoading();
      drawMultilineMessage([
        'Could not load this HEIC file.',
        'This variant is not supported in browser.',
        'Convert it to JPG/PNG first.'
      ]);
      drawPreviewPlaceholder();
    }
  }

  async function isProbablyHeic(file) {
    const name = (file.name || '').toLowerCase();
    const type = (file.type || '').toLowerCase();

    if (
      type === 'image/heic' ||
      type === 'image/heif' ||
      type === 'image/heic-sequence' ||
      type === 'image/heif-sequence' ||
      name.endsWith('.heic') ||
      name.endsWith('.heif') ||
      name.endsWith('.heics') ||
      name.endsWith('.heifs')
    ) {
      return true;
    }

    try {
      const buffer = await file.slice(0, 80).arrayBuffer();
      const bytes = new Uint8Array(buffer);
      let header = '';

      for (let i = 0; i < bytes.length; i++) {
        header += String.fromCharCode(bytes[i]);
      }

      const brands = [
        'ftypheic',
        'ftypheix',
        'ftyphevc',
        'ftyphevx',
        'ftypheim',
        'ftypheis',
        'ftypmif1',
        'ftypmsf1'
      ];

      return brands.some(b => header.includes(b));
    } catch {
      return false;
    }
  }

  function getHeicToConverter() {
    if (typeof window.heicTo === 'function') return window.heicTo;
    if (window.heicTo && typeof window.heicTo.heicTo === 'function') return window.heicTo.heicTo;

    if (typeof window.HeicTo === 'function') return window.HeicTo;
    if (window.HeicTo && typeof window.HeicTo.heicTo === 'function') return window.HeicTo.heicTo;

    return null;
  }

  async function convertHeicFile(file) {
    const errors = [];
    const heicToFn = getHeicToConverter();

    if (heicToFn) {
      try {
        const converted = await heicToFn({ blob: file, type: 'image/jpeg', quality: 1 });
        return normalizeConvertedBlob(converted, 'image/jpeg');
      } catch (err) {
        errors.push('heic-to jpeg: ' + getErrorMessage(err));
      }

      try {
        const converted = await heicToFn({ blob: file, type: 'image/png', quality: 1 });
        return normalizeConvertedBlob(converted, 'image/png');
      } catch (err) {
        errors.push('heic-to png: ' + getErrorMessage(err));
      }
    }

    try {
      const nativeBlob = await nativeDecodeToPng(file);
      if (nativeBlob) return nativeBlob;
    } catch (err) {
      errors.push('native: ' + getErrorMessage(err));
    }

    if (window.heic2any) {
      try {
        const converted = await window.heic2any({ blob: file, toType: 'image/jpeg', quality: 1 });
        return normalizeConvertedBlob(converted, 'image/jpeg');
      } catch (err) {
        errors.push('heic2any jpeg: ' + getErrorMessage(err));
      }

      try {
        const converted = await window.heic2any({ blob: file, toType: 'image/png' });
        return normalizeConvertedBlob(converted, 'image/png');
      } catch (err) {
        errors.push('heic2any png: ' + getErrorMessage(err));
      }
    }

    throw new Error('HEIC conversion failed. ' + errors.join(' | '));
  }

  function normalizeConvertedBlob(result, fallbackType) {
    if (Array.isArray(result)) result = result[0];
    if (result instanceof Blob) return result;
    return new Blob([result], { type: fallbackType });
  }

  async function nativeDecodeToPng(file) {
    if ('createImageBitmap' in window) {
      const bitmap = await createImageBitmap(file);

      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');

      tempCanvas.width = bitmap.width;
      tempCanvas.height = bitmap.height;

      tempCtx.drawImage(bitmap, 0, 0);

      if (bitmap.close) bitmap.close();

      return await canvasToBlob(tempCanvas, 'image/png', 1);
    }

    const nativeImage = await loadImageOnly(file);

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    tempCanvas.width = nativeImage.naturalWidth || nativeImage.width;
    tempCanvas.height = nativeImage.naturalHeight || nativeImage.height;

    tempCtx.drawImage(nativeImage, 0, 0);

    return await canvasToBlob(tempCanvas, 'image/png', 1);
  }

  function canvasToBlob(c, type, quality) {
    return new Promise((resolve, reject) => {
      c.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error('Canvas export failed'));
      }, type, quality);
    });
  }

  function loadImageOnly(blob) {
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(blob);
      const img = new Image();

      img.onload = () => {
        URL.revokeObjectURL(url);
        resolve(img);
      };

      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Image load failed'));
      };

      img.src = url;
    });
  }

  function loadBlobIntoImage(blob) {
    return new Promise((resolve, reject) => {
      if (currentImageUrl) {
        URL.revokeObjectURL(currentImageUrl);
        currentImageUrl = null;
      }

      currentImageUrl = URL.createObjectURL(blob);
      image = new Image();

      image.onload = () => resolve();
      image.onerror = () => reject(new Error('Could not load image after conversion'));

      image.src = currentImageUrl;
    });
  }

  function getErrorMessage(err) {
    if (!err) return 'unknown error';
    if (typeof err === 'string') return err;
    if (err.message) return err.message;
    return String(err);
  }

  circleSizeInput.addEventListener('input', () => {
    circleSizeValue.textContent = circleSizeInput.value + '%';

    if (!imageLoaded) return;

    updateCircleRadius();
    clampCircle();
    draw();
    updatePreviewIfVisible();
  });

  cornerRadiusInput.addEventListener('input', () => {
    cornerRadiusValue.textContent = cornerRadiusInput.value + '%';

    if (!imageLoaded) return;

    draw();
    updatePreviewIfVisible();
  });

  rotateLeftBtn.addEventListener('click', () => {
    if (!imageLoaded) return;

    rotation = (rotation + 270) % 360;

    prepareCanvasForImage();
    resetCircle();
    draw();
    updatePreviewIfVisible();
  });

  rotateRightBtn.addEventListener('click', () => {
    if (!imageLoaded) return;

    rotation = (rotation + 90) % 360;

    prepareCanvasForImage();
    resetCircle();
    draw();
    updatePreviewIfVisible();
  });

  flipHorizontalBtn.addEventListener('click', () => {
    if (!imageLoaded) return;

    flipX = !flipX;
    draw();
    updatePreviewIfVisible();
  });

  flipVerticalBtn.addEventListener('click', () => {
    if (!imageLoaded) return;

    flipY = !flipY;
    draw();
    updatePreviewIfVisible();
  });

  formatSelect.addEventListener('change', () => {
    backgroundControls.style.display = formatSelect.value === 'image/jpeg' ? 'block' : 'none';
    updatePreviewIfVisible();
  });

  backgroundChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;

    backgroundChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    selectedBackground = chip.dataset.bg;

    updatePreviewIfVisible();
  });

  customBackgroundInput.addEventListener('input', () => {
    selectedBackground = customBackgroundInput.value;
    customColorDot.style.background = selectedBackground;
    customColorValue.textContent = selectedBackground.toUpperCase();

    backgroundChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));

    updatePreviewIfVisible();
  });

  sizeChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;

    sizeChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');

    selectedSize = chip.dataset.size;

    updatePreviewIfVisible();
  });

  downloadBtn.addEventListener('click', () => {
    if (!imageLoaded) return;

    const opt = formatSelect.options[formatSelect.selectedIndex];
    const mimeType = opt.value;
    const extension = opt.dataset.extension;

    const crop = getCropData();

    let outputSize = crop.outputSize;
    if (selectedSize !== 'original') outputSize = parseInt(selectedSize, 10);

    const out = createExportCanvas(outputSize, mimeType);

    const link = document.createElement('a');
    link.download = makeOutputName(originalFileName, extension);
    link.href = out.toDataURL(mimeType, 1);
    link.click();
  });

  downloadZipBtn.addEventListener('click', async () => {
    if (zipImages.length === 0) return;

    const opt = formatSelect.options[formatSelect.selectedIndex];
    const mimeType = opt.value;
    const extension = opt.dataset.extension;

    const fracX = imageLoaded && canvas.width > 0 ? circle.x / canvas.width : 0.5;
    const fracY = imageLoaded && canvas.height > 0 ? circle.y / canvas.height : 0.5;
    const fracR = imageLoaded && Math.min(canvas.width, canvas.height) > 0
      ? circle.radius / Math.min(canvas.width, canvas.height)
      : (Number(circleSizeInput.value) / 100) * 0.5;

    const savedImage = image;
    const savedImageLoaded = imageLoaded;
    const savedRotation = rotation;
    const savedFlipX = flipX;
    const savedFlipY = flipY;
    const savedCircle = { ...circle };
    const savedCanvasW = canvas.width;
    const savedCanvasH = canvas.height;
    const savedOriginalName = originalFileName;

    downloadZipBtn.disabled = true;
    downloadBtn.disabled = true;

    showLoading('Processing images…', true);

    const jszip = new JSZip();

    for (let i = 0; i < zipImages.length; i++) {
      const item = zipImages[i];

      loadingText.textContent = `Processing ${i + 1} / ${zipImages.length}…`;
      setLoadingProgress(((i + 1) / zipImages.length) * 100);

      try {
        let displayBlob = item.convertedBlob || item.blob;

        if (!item.convertedBlob && await isProbablyHeic(item.blob)) {
          displayBlob = await convertHeicFile(item.blob);
          item.convertedBlob = displayBlob;
        }

        const tempImg = await loadImageOnly(displayBlob);

        image = tempImg;
        imageLoaded = true;
        rotation = savedRotation;
        flipX = savedFlipX;
        flipY = savedFlipY;

        prepareCanvasForImage();

        circle.x = canvas.width * fracX;
        circle.y = canvas.height * fracY;
        circle.radius = Math.min(canvas.width, canvas.height) * fracR;

        clampCircle();

        const crop = getCropData();

        let outputSize = Math.round(crop.sourceSize);
        if (selectedSize !== 'original') outputSize = parseInt(selectedSize, 10);

        const exportCanvas = createExportCanvas(outputSize, mimeType);
        const blob = await canvasToBlob(exportCanvas, mimeType, 1);

        jszip.file(makeOutputName(item.name, extension), blob);

      } catch (err) {
        console.error('Failed to process', item.name, err);
      }
    }

    loadingText.textContent = 'Creating ZIP…';

    const zipBlob = await jszip.generateAsync({ type: 'blob' });

    image = savedImage;
    imageLoaded = savedImageLoaded;
    rotation = savedRotation;
    flipX = savedFlipX;
    flipY = savedFlipY;
    circle = savedCircle;
    originalFileName = savedOriginalName;

    if (imageLoaded) {
      canvas.width = savedCanvasW;
      canvas.height = savedCanvasH;
      canvas.style.aspectRatio = savedCanvasW + ' / ' + savedCanvasH;
      draw();
    }

    hideLoading();

    downloadZipBtn.disabled = false;
    downloadBtn.disabled = !imageLoaded;

    const link = document.createElement('a');
    link.download = 'circle-crop-all.zip';
    link.href = URL.createObjectURL(zipBlob);
    link.click();

    setTimeout(() => URL.revokeObjectURL(link.href), 30000);
  });

  canvas.addEventListener('pointerdown', (e) => {
    if (!imageLoaded) return;

    const p = toCanvas(e);

    if (Math.hypot(p.x - circle.x, p.y - circle.y) <= circle.radius) {
      isDragging = true;
      dragOffsetX = p.x - circle.x;
      dragOffsetY = p.y - circle.y;
      canvas.setPointerCapture(e.pointerId);
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!isDragging) return;

    const p = toCanvas(e);

    circle.x = p.x - dragOffsetX;
    circle.y = p.y - dragOffsetY;

    clampCircle();
    draw();
    updatePreviewIfVisible();
  });

  canvas.addEventListener('pointerup', () => {
    isDragging = false;
  });

  canvas.addEventListener('pointercancel', () => {
    isDragging = false;
  });

  function imageW() {
    return image.naturalWidth || image.width;
  }

  function imageH() {
    return image.naturalHeight || image.height;
  }

  function getEffectiveImageSize() {
    const rotated = rotation === 90 || rotation === 270;

    return {
      width: rotated ? imageH() : imageW(),
      height: rotated ? imageW() : imageH()
    };
  }

  function prepareCanvasForImage() {
    const effective = getEffectiveImageSize();

    canvas.width = 1400;
    canvas.height = Math.round(1400 * effective.height / effective.width);
    canvas.style.aspectRatio = effective.width + ' / ' + effective.height;
  }

  function setPlaceholderCanvas() {
    canvas.width = 1200;
    canvas.height = 800;
    canvas.style.aspectRatio = '3 / 2';
  }

  function resetCircle() {
    circle.x = canvas.width / 2;
    circle.y = canvas.height / 2;

    updateCircleRadius();
    clampCircle();
  }

  function updateCircleRadius() {
    const pct = Number(circleSizeInput.value) / 100;
    circle.radius = Math.min(canvas.width, canvas.height) / 2 * pct;
  }

  function clampCircle() {
    circle.x = Math.max(circle.radius, Math.min(canvas.width - circle.radius, circle.x));
    circle.y = Math.max(circle.radius, Math.min(canvas.height - circle.radius, circle.y));
  }

  function drawTransformedImage(targetCtx, width, height) {
    const rotated = rotation === 90 || rotation === 270;
    const drawWidth = rotated ? height : width;
    const drawHeight = rotated ? width : height;

    targetCtx.save();
    targetCtx.translate(width / 2, height / 2);
    targetCtx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
    targetCtx.rotate(rotation * Math.PI / 180);
    targetCtx.drawImage(image, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
    targetCtx.restore();
  }

  function createTransformedSourceCanvas() {
    const effective = getEffectiveImageSize();

    const sourceCanvas = document.createElement('canvas');
    const sourceCtx = sourceCanvas.getContext('2d');

    sourceCanvas.width = effective.width;
    sourceCanvas.height = effective.height;

    drawTransformedImage(sourceCtx, sourceCanvas.width, sourceCanvas.height);

    return sourceCanvas;
  }

  function createExportCanvas(outputSize, mimeType) {
    const crop = getCropData();
    const sourceCanvas = createTransformedSourceCanvas();

    const out = document.createElement('canvas');
    const octx = out.getContext('2d');

    out.width = outputSize;
    out.height = outputSize;

    if (mimeType === 'image/jpeg') {
      octx.fillStyle = selectedBackground;
      octx.fillRect(0, 0, outputSize, outputSize);
    }

    const isFullCircle = Number(cornerRadiusInput.value) >= 100;
    const cr = isFullCircle
      ? outputSize / 2
      : (Number(cornerRadiusInput.value) / 100) * (outputSize / 2);

    octx.save();
    cropPathOn(octx, 0, 0, outputSize, isFullCircle, cr);
    octx.clip();
    octx.drawImage(
      sourceCanvas,
      crop.sourceX,
      crop.sourceY,
      crop.sourceSize,
      crop.sourceSize,
      0,
      0,
      outputSize,
      outputSize
    );
    octx.restore();

    return out;
  }

  function cropPathOn(c, x, y, size, isCircle, cr) {
    if (isCircle) {
      c.beginPath();
      c.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
    } else {
      const r = Math.min(cr, size / 2);

      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + size, y, x + size, y + size, r);
      c.arcTo(x + size, y + size, x, y + size, r);
      c.arcTo(x, y + size, x, y, r);
      c.arcTo(x, y, x + size, y, r);
      c.closePath();
    }
  }

  function draw() {
    if (!imageLoaded) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawTransformedImage(ctx, canvas.width, canvas.height);

    const x = circle.x - circle.radius;
    const y = circle.y - circle.radius;
    const s = circle.radius * 2;

    const isFullCircle = Number(cornerRadiusInput.value) >= 100;
    const cr = isFullCircle
      ? circle.radius
      : (Number(cornerRadiusInput.value) / 100) * circle.radius;

    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.globalCompositeOperation = 'destination-out';
    cropPathOn(ctx, x, y, s, isFullCircle, cr);
    ctx.fill();
    ctx.restore();

    ctx.save();
    cropPathOn(ctx, x, y, s, isFullCircle, cr);
    ctx.clip();
    drawTransformedImage(ctx, canvas.width, canvas.height);
    ctx.restore();

    ctx.save();
    cropPathOn(ctx, x, y, s, isFullCircle, cr);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 6]);
    ctx.stroke();
    ctx.restore();
  }

  function drawPreview() {
    if (!imageLoaded) {
      drawPreviewPlaceholder();
      return;
    }

    const mimeType = formatSelect.value;
    const out = createExportCanvas(previewCanvas.width, mimeType);

    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.drawImage(out, 0, 0, previewCanvas.width, previewCanvas.height);
  }

  function drawPreviewPlaceholder() {
    const dark = document.documentElement.dataset.theme !== 'light';

    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.fillStyle = dark ? '#0f172a' : '#e2e8f0';
    previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

    previewCtx.fillStyle = dark ? '#64748b' : '#94a3b8';
    previewCtx.font = '26px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    previewCtx.textAlign = 'center';
    previewCtx.textBaseline = 'middle';
    previewCtx.fillText('Preview', previewCanvas.width / 2, previewCanvas.height / 2);
  }

  function getCropData() {
    const effective = getEffectiveImageSize();

    const scaleX = effective.width / canvas.width;
    const scaleY = effective.height / canvas.height;

    const sourceX = (circle.x - circle.radius) * scaleX;
    const sourceY = (circle.y - circle.radius) * scaleY;
    const sourceSize = Math.min(circle.radius * 2 * scaleX, circle.radius * 2 * scaleY);

    return {
      sourceX,
      sourceY,
      sourceSize,
      outputSize: Math.round(sourceSize)
    };
  }

  function toCanvas(e) {
    const rect = canvas.getBoundingClientRect();

    return {
      x: (e.clientX - rect.left) * (canvas.width / rect.width),
      y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function drawMessage(text) {
    const dark = document.documentElement.dataset.theme !== 'light';

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = dark ? '#0f172a' : '#e2e8f0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = dark ? '#64748b' : '#94a3b8';
    ctx.font = '28px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  }

  function drawMultilineMessage(lines) {
    const dark = document.documentElement.dataset.theme !== 'light';

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = dark ? '#0f172a' : '#e2e8f0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = dark ? '#94a3b8' : '#64748b';
    ctx.font = '26px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const lineHeight = 38;
    const startY = canvas.height / 2 - ((lines.length - 1) * lineHeight) / 2;

    lines.forEach((line, i) => {
      ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
    });
  }

  function makeOutputName(name, ext) {
    return (name || 'photo').replace(/\.[^/.]+$/, '') + '-crop.' + ext;
  }

  setPlaceholderCanvas();
  drawMessage('Upload photo or ZIP');
  drawPreviewPlaceholder();
</script>

</body>
</html>
